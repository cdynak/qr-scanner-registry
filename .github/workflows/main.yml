name: Main Branch CI/CD

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Build application
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start application for E2E tests
        run: |
          npm run preview &
          sleep 10
        env:
          NODE_ENV: test

      - name: Run comprehensive E2E tests
        run: |
          echo "Running infrastructure tests..."
          npm run e2e:infrastructure
          
          echo "Running authentication tests..."
          npm run e2e:auth
          
          echo "Running scanner tests..."
          npm run e2e:scanner
          
          echo "Running scan history tests..."
          npm run e2e:history
          
          echo "Running user workflow tests..."
          npm run e2e:workflow
          
          echo "Running cross-browser tests..."
          npm run e2e:cross-browser
        env:
          NODE_ENV: test

      - name: Upload comprehensive test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: main-branch-test-results
          path: |
            coverage/
            test-results/
            playwright-report/
          retention-days: 30

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "### Unit Tests" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            echo "Coverage report generated successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Coverage report not found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "### E2E Tests" >> $GITHUB_STEP_SUMMARY
          if [ -d test-results ]; then
            echo "E2E tests completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ E2E tests failed to complete" >> $GITHUB_STEP_SUMMARY
          fi

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test]
    if: failure()
    
    steps:
      - name: Notify team of failure
        run: |
          echo "Main branch tests failed!"
          echo "Please check the test results and fix any issues."
          echo "Build URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"